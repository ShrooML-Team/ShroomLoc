name: Build and Deploy Docker

on:
    push:
        branches: [master, main]
        tags: ["v*"]
    pull_request:
        branches: [master, main]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python 3.12
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"

            - name: Cache pip dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-asyncio httpx pytest-cov

            - name: Run tests
              run: |
                  if [ -f pytest.ini ] || [ -d tests ]; then
                    pytest -v --cov=app --cov-report=term-missing
                  else
                    echo "Aucun test trouvé, passage des tests"
                  fi

    build-and-push:
        needs: test
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            - name: Update docker-compose.yml with new tag
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  TAG_NAME=${GITHUB_REF#refs/tags/}
                  echo "Mise à jour du docker-compose.yml avec le tag: $TAG_NAME"
                  
                  # Met à jour la valeur par défaut dans docker-compose.yml
                  sed -i "s|\${IMAGE_TAG:-.*}|\${IMAGE_TAG:-$TAG_NAME}|" docker-compose.yml
                  
                  echo "docker-compose.yml mis à jour : $(grep 'IMAGE_TAG:-' docker-compose.yml)"
                  
            - name: Commit updated files
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add docker-compose.yml
                  git commit -m "🤖 Auto-update to ${GITHUB_REF#refs/tags/}" || exit 0
                  git push origin HEAD:master || echo "Pas de changements à pousser"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Deploy notification
              run: |
                  echo "🚀 Image Docker déployée avec succès!"
                  echo "📦 Registry: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
                  echo "🏷️  Tag utilisé: ${GITHUB_REF#refs/tags/}"

                  # Ici vous pouvez ajouter des steps pour déployer sur votre infrastructure
                  # Par exemple: kubectl, docker-compose sur un serveur, etc.

            # Exemple de déploiement vers un serveur distant (à décommenter et configurer)
            # - name: Deploy to server
            #   uses: appleboy/ssh-action@v1.0.0
            #   with:
            #     host: ${{ secrets.HOST }}
            #     username: ${{ secrets.USERNAME }}
            #     key: ${{ secrets.SSH_KEY }}
            #     script: |
            #       docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            #       docker stop shroomloc || true
            #       docker rm shroomloc || true
            #       docker run -d --name shroomloc -p 8000:8000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    create-release:
        needs: build-and-push
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v') 
        permissions: 
            contents: write

        steps:
            - name: Set lowercase repository name
              run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                generate_release_notes: true
                body: |
                    🚀 **Nouvelle version de ShroomLoc !**

                    📦 **Image Docker disponible :**
                    ```bash
                    docker pull ghcr.io/${{ env.REPO_LOWER }}:${{ github.ref_name }}
                    docker pull ghcr.io/${{ env.REPO_LOWER }}:latest
                    ```

                    🔄 **Changements inclus dans cette version :**
                    Voir les notes générées automatiquement ci-dessous.


        